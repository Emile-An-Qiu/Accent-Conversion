<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>StarGANv2-VC 录音变声版</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f8ff; font-family: sans-serif; margin: 0;}
        .avatar-face { width: 200px; height: 200px; background-color: #ffcc00; border-radius: 50%; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: all 0.1s; }
        .eyes { position: absolute; top: 60px; width: 100%; display: flex; justify-content: space-evenly; }
        .eye { width: 30px; height: 40px; background-color: #333; border-radius: 50%; }
        .mouth { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 60px; height: 5px; background-color: #e74c3c; border-radius: 30px; transition: height 0.05s ease-out; }
        
        button { margin-top: 40px; padding: 15px 30px; font-size: 18px; background-color: #007bff; color: white; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s;}
        button:hover { filter: brightness(1.1); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-recording { background-color: #dc3545 !important; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #status { margin-top: 15px; color: #666; font-weight: bold; }
    </style>
</head>
<body>
    <div class="avatar-face" id="avatar">
        <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
        <div class="mouth" id="mouth"></div>
    </div>
    
    <button id="mainBtn">🔗 1. 点击连接服务器</button>
    <div id="status">请先连接服务器</div>

    <script>
        const btn = document.getElementById('mainBtn');
        const mouth = document.getElementById('mouth');
        const status = document.getElementById('status');
        
        let ws, audioContext, analyser, mediaRecorder;
        let audioChunks = [];
        let state = 'init'; // init -> connected -> recording -> processing

        btn.onclick = async () => {
            if (state === 'init') {
                connectWebSocket();
            } else if (state === 'connected') {
                startRecording();
            } else if (state === 'recording') {
                stopRecordingAndSend();
            }
        };

        function connectWebSocket() {
            btn.disabled = true;
            status.innerText = "正在连接 Colab...";
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.connect(audioContext.destination);
            drawMouth();

            // 你的专属固定隧道地址！
            ws = new WebSocket('wss://indistinctively-nonhesitant-briggs.ngrok-free.dev/ws/vc');
            ws.binaryType = 'arraybuffer';

            ws.onopen = async () => {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                
                // 收集录音碎片
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                
                // 停止录音时，打包发送给后端
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    ws.send(audioBlob);
                    audioChunks = []; // 清空准备下次录音
                };

                state = 'connected';
                btn.disabled = false;
                btn.innerText = "🎤 点击开始录音";
                btn.style.backgroundColor = "#28a745";
                status.innerText = "✅ 连接成功！准备就绪。";
            };

            // 接收变声后的音频
            ws.onmessage = async (event) => {
                try {
                    const audioBuffer = await audioContext.decodeAudioData(event.data);
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(analyser); // 连接到分析器让嘴巴动
                    
                    status.innerText = "🔊 AI 正在说话...";
                    source.start(0);
                    
                    source.onended = () => {
                        state = 'connected';
                        btn.disabled = false;
                        btn.innerText = "🎤 点击开始录音";
                        status.innerText = "✅ 播放完毕，可进行下一次录音。";
                    };
                } catch (e) {
                    console.error("解码失败:", e);
                    status.innerText = "❌ 收到无效的音频数据";
                    resetButton();
                }
            };

            ws.onerror = () => { status.innerText = "❌ 连接失败，请检查 Colab。"; };
        }

        function startRecording() {
            state = 'recording';
            audioChunks = [];
            mediaRecorder.start();
            btn.innerText = "⏹️ 停止录音并发送";
            btn.classList.add('btn-recording');
            status.innerText = "🎙️ 正在录音... (说一段完整的话)";
        }

        function stopRecordingAndSend() {
            state = 'processing';
            mediaRecorder.stop();
            btn.classList.remove('btn-recording');
            btn.innerText = "⏳ AI 正在拼命变声中...";
            btn.disabled = true;
            status.innerText = "🚀 录音已发送，等待大模型处理...";
        }

        function resetButton() {
            state = 'connected';
            btn.disabled = false;
            btn.innerText = "🎤 点击开始录音";
        }

        // 嘴巴动画
        function drawMouth() {
            requestAnimationFrame(drawMouth);
            if(!analyser) return;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);
            let averageVolume = dataArray.reduce((a, b) => a + b) / dataArray.length;

            if (averageVolume > 2) {
                let mouthHeight = 10 + (averageVolume * 1.5);
                mouth.style.height = Math.min(mouthHeight, 80) + 'px';
                mouth.style.borderRadius = '50%';
            } else {
                mouth.style.height = '5px';
                mouth.style.borderRadius = '30px';
            }
        }
    </script>
</body>
</html>
